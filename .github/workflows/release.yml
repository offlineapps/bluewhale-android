name: Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*.*.*' # Triggers for tags like v1.0.0

# Signed release builds require these repository secrets:
#   SIGNING_KEYSTORE_BASE64 - base64 of the release keystore: base64 -w0 bluewhale-release.keystore
#   SIGNING_STORE_PASSWORD  - keystore password
#   SIGNING_KEY_ALIAS       - key alias
#   SIGNING_KEY_PASSWORD    - key password
# Note: CI produces signed APKs + plain SHA256SUMS. The detached PGP signature
# (SHA256SUMS.asc) is created manually so the signing key never lives in CI.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: wrapper

      - name: Cache Gradle files
        uses: actions/cache@v3
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for Gradlew
        run: chmod +x ./gradlew

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: echo "$SIGNING_KEYSTORE_BASE64" | base64 --decode > "$GITHUB_WORKSPACE/release.keystore"

      - name: Create keystore.properties
        env:
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          cat > keystore.properties <<EOF
          storeFile=$GITHUB_WORKSPACE/release.keystore
          storePassword=$SIGNING_STORE_PASSWORD
          keyAlias=$SIGNING_KEY_ALIAS
          keyPassword=$SIGNING_KEY_PASSWORD
          EOF

      - name: Build signed release APKs (with architecture splits)
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Rename APKs and generate checksums
        run: |
          cd app/build/outputs/apk/release
          for abi in arm64-v8a armeabi-v7a x86 x86_64 universal; do
            [ -f "app-$abi-release.apk" ] && mv "app-$abi-release.apk" "bluewhale-${{ github.ref_name }}-$abi.apk"
          done
          sha256sum bluewhale-*.apk > SHA256SUMS
          echo "Built artifacts:"; ls -lh

      - name: Verify signing
        run: |
          APKSIGNER=$(find "$ANDROID_HOME"/build-tools -name apksigner | sort -V | tail -1)
          "$APKSIGNER" verify app/build/outputs/apk/release/bluewhale-${{ github.ref_name }}-universal.apk

      - name: Upload APKs as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: bluewhale-release-${{ github.ref_name }}
          path: |
            app/build/outputs/apk/release/bluewhale-*.apk
            app/build/outputs/apk/release/SHA256SUMS
          retention-days: 30
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: bluewhale-release-${{ github.ref_name }}
          path: release

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            release/bluewhale-*.apk
            release/SHA256SUMS
          name: bluewhale ${{ github.ref_name }}
          body: |
            Signed APKs for ${{ github.ref_name }}. Verify downloads against SHA256SUMS.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
